<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#2D6A4F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="居家醫療" />
  <title>居家醫療管理系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F5F2EC; font-family: 'Noto Serif TC', 'Georgia', serif; }
    #root { min-height: 100vh; }
    input, select, textarea, button { font-family: inherit; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity:0; } to { transform: translateX(-50%) translateY(0); opacity:1; } }
    @keyframes fadeIn  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    input:focus, select:focus, textarea:focus { outline: 2px solid #52B788 !important; outline-offset: 1px; }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:#f0ede6; }
    ::-webkit-scrollbar-thumb { background:#b5c4b1; border-radius:3px; }
    .chk { width:20px; height:20px; cursor:pointer; accent-color:#2D6A4F; flex-shrink:0; }
    .tab-btn { flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 700; cursor: pointer; border: none; background: transparent; color: #fff; opacity: 0.6; transition: all 0.2s; }
    .tab-btn.active { opacity: 1; border-bottom: 3px solid #fff; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const T = {
  bg:"#F5F2EC", primary:"#2D6A4F", primaryLight:"#52B788", primaryDark:"#1B4332",
  danger:"#C0392B", warning:"#E67E22", text:"#1A1A2E", textMuted:"#6B7280",
  border:"#E8E0D0", yellow:"#FFF8E1", yellowBorder:"#FFB300",
};

const addDays = (ds,n) => { if(!ds) return ""; const d=new Date(ds); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const daysUntil = ds => { if(!ds) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.ceil((new Date(ds)-t)/86400000); };
const fmt = ds => { if(!ds) return "—"; const [y,m,d]=ds.split("-"); return `${y}/${m}/${d}`; };
const genId = () => "P"+Date.now().toString().slice(-8)+Math.random().toString(36).slice(2,5);
const LOCAL_KEY = "home_visit_v2";
const GMAPS_KEY = "gmaps_api_key";
const GAS_KEY = "gas_url_v2";

const loadLocal = () => { try { return JSON.parse(localStorage.getItem(LOCAL_KEY)||"[]"); } catch(e) { return []; } };
const saveLocal = d => { try { localStorage.setItem(LOCAL_KEY, JSON.stringify(d)); } catch(e){} };

const FIELD_MAP = [
  { key:"name",         patterns:["病患姓名","姓名","名字","name"] },
  { key:"chartNo",      patterns:["掛號證","病歷號","病歷證","chart"] },
  { key:"phone",        patterns:["電話","phone","tel"] },
  { key:"address",      patterns:["住址","地址","address"] },
  { key:"contactPhone", patterns:["聯絡人電話"] },
  { key:"contact",      patterns:["聯絡人"] },
  { key:"team",         patterns:["團隊"] },
  { key:"referral",     patterns:["轉介"] },
  { key:"clinic",       patterns:["診所","西醫"] },
  { key:"diagnosis",    patterns:["病名","病症","診斷"] },
  { key:"admitDate",    patterns:["收案日","入案日","收案日期","入案日期"] },
  { key:"closeDate",    patterns:["結案日","結案日期"] },
];
function matchField(header) {
  const h=(header||"").toLowerCase();
  for (const f of FIELD_MAP) {
    if (f.patterns.some(p=>h.includes(p.toLowerCase()))) return f.key;
  }
  return null;
}

function convertROCDate(val) {
  if (!val) return "";
  const s = String(val).trim();
  const m = s.match(/^(\d{2,3})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m) {
    const y = parseInt(m[1]) + 1911;
    const mo = m[2].padStart(2,"0");
    const d  = m[3].padStart(2,"0");
    return `${y}-${mo}-${d}`;
  }
  const m2 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m2) return `${m2[1]}-${m2[2].padStart(2,"0")}-${m2[3].padStart(2,"0")}`;
  return s;
}

function FormField({ label, full, required, hasErr, errMsg, children }) {
  return (
    <div style={{ gridColumn: full?"1 / -1":"auto" }}>
      <label style={{ display:"block", fontSize:12, color:hasErr?T.danger:T.textMuted, marginBottom:4, fontWeight:600 }}>
        {label}{required && <span style={{ color:T.danger }}> *</span>}
      </label>
      {children}
      {hasErr && <div style={{ fontSize:11, color:T.danger, marginTop:3 }}>{errMsg}</div>}
    </div>
  );
}
const inpStyle = hasErr => ({
  width:"100%", padding:"10px 12px", borderRadius:8,
  border:`1.5px solid ${hasErr?T.danger:T.border}`,
  fontSize:14, background:"#fff", color:T.text,
});
