<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1565C0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="路線規劃" />
  <title>居家訪視路線規劃</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; background:#F0F4FF; font-family:'Noto Serif TC',Georgia,serif; }
    #root { min-height:100vh; }
    input,select,textarea,button { font-family:inherit; }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{transform:translateX(-50%) translateY(20px);opacity:0} to{transform:translateX(-50%) translateY(0);opacity:1} }
    input:focus,select:focus { outline:2px solid #1976D2 !important; outline-offset:1px; }
    ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-thumb{background:#90CAF9;border-radius:3px}
    .day-tab{padding:7px 13px;border:none;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
    .day-tab.active{background:#1565C0;color:#fff;box-shadow:0 2px 8px rgba(21,101,192,.35)}
    .day-tab.inactive{background:#fff;color:#5C6BC0;border:1.5px solid #C5CAE9}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const getApiKey = () => localStorage.getItem("gmaps_api_key") || "";
const LOCAL_KEY_PATIENTS = "home_visit_v2";
const DAYS    = ["週一","週二","週三","週四","週五"];
const DAY_KEYS = ["mon","tue","wed","thu","fri"];
const DOCTOR_COLORS = ["#1565C0","#2E7D32","#6A1B9A","#C62828","#E65100","#00695C"];

const T = {
  bg:"#F0F4FF", primary:"#1565C0", primaryLight:"#1976D2", primaryDark:"#0D47A1",
  success:"#2E7D32", danger:"#C62828", warning:"#E65100",
  text:"#1A237E", textMuted:"#546E7A", border:"#C5CAE9", card:"#FFFFFF",
};

// ── 工具 ─────────────────────────────────────────────────────
const addDays  = (ds,n) => { if(!ds) return ""; const d=new Date(ds); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };
const loadLocal = k => { try{ return JSON.parse(localStorage.getItem(k)||"null"); }catch{ return null; } };
const saveLocal = (k,v) => localStorage.setItem(k, JSON.stringify(v));
const minsToTime = m => `${Math.floor(m/60).toString().padStart(2,"0")}:${(m%60).toString().padStart(2,"0")}`;
const timeToMins = t => { if(!t) return 0; const [h,m]=t.split(":").map(Number); return h*60+m; };

// ── Geocoding ────────────────────────────────────────────────
async function geocode(address) {
  const key = getApiKey();
  if (!key) throw new Error("尚未設定 API 金鑰");
  const res  = await fetch(`https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&key=${key}&language=zh-TW&region=TW`);
  const data = await res.json();
  if (data.status==="OK" && data.results.length>0) return data.results[0].geometry.location;
  return null;
}

// ── 路線規劃演算法 ────────────────────────────────────────────
function travelMins(a, b) {
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.ceil(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))*2);
}

function planDay(dayKey, patients, coords, startCoord, endCoord, cfg) {
  const startM=timeToMins(cfg.startTime), endM=timeToMins(cfg.endTime);
  const available = patients.filter(p=>{
    const s=p.schedule||{};
    const dd=s[dayKey];
    if (!dd) return false;
    if (!coords[p.id]) return false;
    // 新格式：slots陣列；舊格式：enabled+windowStart/End
    return (dd.slots?.length>0) || (dd.enabled && s.windowStart);
  });
  if (!available.length) return { route:[], unscheduled:[] };

  let curCoord=startCoord, curTime=startM;
  const route=[], remaining=[...available], unscheduled=[];

  while (remaining.length>0) {
    let best=null, bestIdx=-1, bestFinish=Infinity;
    remaining.forEach((p,i)=>{
      const coord=coords[p.id];
      const travel=travelMins(curCoord,coord);
      const arrival=curTime+travel;
      const s=p.schedule;
      const dd=s[dayKey];
      // 支援新格式（slots）和舊格式
      const slots=dd?.slots?.length>0
        ? dd.slots
        : [{start:s.windowStart||"09:00", end:s.windowEnd||"17:00", visitMins:s.visitMins||cfg.visitMins}];
      // 找最早能安排的時段
      for (const slot of slots) {
        const winStart=timeToMins(slot.start), winEnd=timeToMins(slot.end);
        const visit=slot.visitMins||cfg.visitMins;
        const start=Math.max(arrival,winStart);
        const finish=start+visit;
        const toEnd=endCoord?travelMins(coord,endCoord):0;
        if (finish+toEnd<=endM && finish<=winEnd && finish<bestFinish) {
          best={...p,_arrival:arrival,_start:start,_finish:finish,_travel:travel};
          bestIdx=i; bestFinish=finish;
          break; // 找到最早時段即可
        }
      }
    });
    if (!best) { remaining.forEach(p=>unscheduled.push({patient:p,reason:"時間窗口或行程時間不足"})); break; }
    route.push({ patient:best, arrival:best._arrival, start:best._start, finish:best._finish, travel:best._travel, coord:coords[best.id] });
    curCoord=coords[best.id]; curTime=best._finish;
    remaining.splice(bestIdx,1);
  }
  return { route, unscheduled };
}

// ══════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════
function App() {
  const [allPatients, setAllPatients] = useState([]);
  const [doctors, setDoctors]         = useState([]);       // 從個案資料抽出
  const [activeDoctor, setActiveDoctor] = useState(null);   // 目前選擇的醫師
  const [view, setView]               = useState("setup");  // setup | schedule | result
  const [activeDay, setActiveDay]     = useState("mon");
  const [toast, setToast]             = useState(null);
  const [planning, setPlanning]       = useState(false);
  const [result, setResult]           = useState(null);

  // 每位醫師獨立設定：scheduleData[doctor][patientId] = { mon:{enabled}, windowStart, ... }
  const [scheduleData, setScheduleData] = useState(() => loadLocal("route_schedule_v2") || {});
  // 每位醫師獨立行程設定：doctorSettings[doctor] = { visitMins, days:{ mon:{startAddress,...} } }
  const [doctorSettings, setDoctorSettings] = useState(() => loadLocal("doctor_settings_v1") || {});

  useEffect(() => {
    const pts = loadLocal(LOCAL_KEY_PATIENTS) || [];
    const active = pts.filter(p=>!p.closedAt);
    setAllPatients(active);
    // 從個案資料抽取所有醫師名稱
    const docSet = new Set(active.map(p=>p.doctor).filter(Boolean));
    const docList = [...docSet].sort();
    setDoctors(docList);
    if (docList.length>0 && !activeDoctor) setActiveDoctor(docList[0]);
  }, []);

  useEffect(() => {
    if (!toast) return;
    const t=setTimeout(()=>setToast(null),3500);
    return ()=>clearTimeout(t);
  }, [toast]);

  const pushToast = (msg,type="ok") => setToast({msg,type});

  // 當前醫師的患者
  const myPatients = allPatients.filter(p => p.doctor === activeDoctor);

  // 當前醫師的排班設定
  const mySchedule = scheduleData[activeDoctor] || {};
  const saveMySchedule = (pid, data) => {
    const next = { ...scheduleData, [activeDoctor]: { ...mySchedule, [pid]: data } };
    setScheduleData(next);
    saveLocal("route_schedule_v2", next);
  };

  // 當前醫師的行程設定
  const mySettings = doctorSettings[activeDoctor] || { visitMins:25, days:{ mon:{startAddress:"",endAddress:"",startTime:"09:00",endTime:"18:00"}, tue:{startAddress:"",endAddress:"",startTime:"09:00",endTime:"18:00"}, wed:{startAddress:"",endAddress:"",startTime:"09:00",endTime:"18:00"}, thu:{startAddress:"",endAddress:"",startTime:"09:00",endTime:"18:00"}, fri:{startAddress:"",endAddress:"",startTime:"09:00",endTime:"18:00"} } };
  const saveMySettings = (s) => {
    const next = { ...doctorSettings, [activeDoctor]: s };
    setDoctorSettings(next);
    saveLocal("doctor_settings_v1", next);
  };

  // 規劃路線
  const startPlanning = async () => {
    if (!getApiKey()) { pushToast("⚠️ 請先設定 API 金鑰","danger"); return; }
    if (!activeDoctor) { pushToast("⚠️ 找不到醫師資料，請先在個案管理中填寫醫師欄位","danger"); return; }
    const hasDay = DAY_KEYS.some(dk=>mySettings.days?.[dk]?.startAddress);
    if (!hasDay) { pushToast("⚠️ 請先設定至少一天的出發地點","danger"); return; }

    setPlanning(true);
    pushToast("🏠 正在換算患者地址...");
    try {
      const scheduled = myPatients.filter(p=>DAY_KEYS.some(dk=>mySchedule[p.id]?.[dk]?.enabled));
      const coords={};
      for (const p of scheduled) {
        if (p.address) { const c=await geocode(p.address); if(c) coords[p.id]=c; }
      }
      pushToast("📅 正在規劃路線...");
      const res={};
      for (const dk of DAY_KEYS) {
        const ds=mySettings.days?.[dk];
        if (!ds?.startAddress) { res[dk]={route:[],unscheduled:[],skipped:true}; continue; }
        const startCoord=await geocode(ds.startAddress);
        if (!startCoord) { res[dk]={route:[],unscheduled:[],error:"無法解析出發地址"}; continue; }
        let endCoord=startCoord;
        if (ds.endAddress) { endCoord=await geocode(ds.endAddress)||startCoord; }
        const dayPts = myPatients.filter(p=>{
          const s=mySchedule[p.id];
          return s && s[dk]?.enabled && coords[p.id];
        }).map(p=>({...p, schedule: mySchedule[p.id]}));
        res[dk]=planDay(dk, dayPts, coords, startCoord, endCoord, { startTime:ds.startTime, endTime:ds.endTime, visitMins:mySettings.visitMins });
        res[dk].daySettings=ds;
      }
      setResult({doctor:activeDoctor, days:res});
      setView("result");
      setActiveDay(DAY_KEYS.find(dk=>!res[dk].skipped)||"mon");
      pushToast("✅ 路線規劃完成！");
    } catch(err) {
      pushToast("❌ 規劃失敗："+err.message,"danger");
    }
    setPlanning(false);
  };

  const getMapsUrl = dk => {
    if (!result?.days?.[dk]) return "#";
    const r=result.days[dk]; if(!r.route.length) return "#";
    const ds=r.daySettings;
    const wp=r.route.map(s=>encodeURIComponent(s.patient.address)).join("|");
    return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(ds?.startAddress||"")}&destination=${encodeURIComponent(ds?.endAddress||ds?.startAddress||"")}&waypoints=${wp}&travelmode=driving`;
  };

  const scheduledCount = myPatients.filter(p=>DAY_KEYS.some(dk=>mySchedule[p.id]?.[dk]?.enabled)).length;
  const docColor = (doc) => DOCTOR_COLORS[doctors.indexOf(doc) % DOCTOR_COLORS.length];

  return (
    <div style={{minHeight:"100vh",background:T.bg}}>
      {/* Header */}
      <header style={{background:`linear-gradient(135deg,${T.primaryDark},${T.primary})`,color:"#fff",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 3px 16px rgba(0,0,0,0.2)",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{background:"rgba(255,255,255,0.15)",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🗺️</div>
          <div>
            <div style={{fontSize:14,fontWeight:700}}>居家訪視路線規劃</div>
            <div style={{fontSize:10,opacity:.7}}>依醫師獨立規劃</div>
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <a href="index.html" style={{background:"rgba(255,255,255,0.15)",border:"1px solid rgba(255,255,255,0.25)",color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:400,textDecoration:"none"}} title="前往個案管理">🏥</a>
          {["setup","schedule","result"].map((v,i)=>(
            <button key={v} onClick={()=>setView(v)} style={{background:view===v?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.08)",border:`1px solid ${view===v?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.2)"}`,color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:view===v?700:400}}>
              {["設定","排班","結果"][i]}
            </button>
          ))}
        </div>
      </header>

      {/* 醫師選擇列 */}
      <div style={{background:T.primaryDark,padding:"10px 16px",display:"flex",alignItems:"center",gap:8,overflowX:"auto"}}>
        <span style={{fontSize:12,color:"rgba(255,255,255,0.7)",flexShrink:0}}>醫師：</span>
        {doctors.length===0 ? (
          <span style={{fontSize:12,color:"rgba(255,255,255,0.5)"}}>尚未在個案資料中填寫醫師欄位</span>
        ) : doctors.map(doc=>(
          <button key={doc} onClick={()=>{setActiveDoctor(doc);setResult(null);}} style={{
            background:activeDoctor===doc?docColor(doc):"rgba(255,255,255,0.1)",
            border:`2px solid ${activeDoctor===doc?docColor(doc):"rgba(255,255,255,0.2)"}`,
            color:"#fff",borderRadius:20,padding:"5px 14px",fontSize:13,fontWeight:700,cursor:"pointer",flexShrink:0,
          }}>👨‍⚕️ {doc}</button>
        ))}
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"14px 12px 60px"}}>
        {!activeDoctor ? (
          <div style={{textAlign:"center",padding:"60px 0",color:T.textMuted}}>
            <div style={{fontSize:40,marginBottom:12}}>👨‍⚕️</div>
            <div style={{fontSize:15}}>請先在個案管理 App 中，為每位個案填寫「負責醫師」欄位</div>
          </div>
        ) : (
          <>
            {view==="setup"   && <SetupView doctor={activeDoctor} docColor={docColor(activeDoctor)} settings={mySettings} onSave={saveMySettings} patients={myPatients} scheduleData={mySchedule} onPlan={startPlanning} planning={planning} scheduledCount={scheduledCount} />}
            {view==="schedule" && <ScheduleView doctor={activeDoctor} docColor={docColor(activeDoctor)} patients={myPatients} scheduleData={mySchedule} onSave={saveMySchedule} defaultVisitMins={mySettings.visitMins} />}
            {view==="result"  && result && result.doctor===activeDoctor && <ResultView result={result.days} doctor={activeDoctor} docColor={docColor(activeDoctor)} activeDay={activeDay} setActiveDay={setActiveDay} getMapsUrl={getMapsUrl} />}
            {view==="result"  && (!result || result.doctor!==activeDoctor) && (
              <div style={{textAlign:"center",padding:"60px 0",color:T.textMuted}}>
                <div style={{fontSize:40,marginBottom:12}}>📋</div>
                <div style={{fontSize:14}}>尚未規劃 {activeDoctor} 的路線，請到「設定」頁按「開始規劃」</div>
              </div>
            )}
          </>
        )}
      </div>

      {toast && <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",zIndex:999,background:toast.type==="danger"?T.danger:T.primaryDark,color:"#fff",padding:"12px 26px",borderRadius:28,fontSize:14,fontWeight:600,boxShadow:"0 6px 24px rgba(0,0,0,0.25)",animation:"slideUp .3s ease",whiteSpace:"nowrap"}}>{toast.msg}</div>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// SetupView
// ══════════════════════════════════════════════════════════════
function SetupView({ doctor, docColor, settings, onSave, patients, scheduleData, onPlan, planning, scheduledCount }) {
  const [s, setS]           = useState(settings);
  const [activeDay, setADay] = useState("mon");
  const [apiKey, setApiKey]  = useState(()=>localStorage.getItem("gmaps_api_key")||"");
  const [showKey, setShowKey]= useState(false);
  const [keySaved, setKeySaved]=useState(false);
  const [savedLocs, setSavedLocs]=useState(()=>JSON.parse(localStorage.getItem("saved_locations")||"[]"));
  const [newLocName, setNewLocName]=useState("");
  const [newLocAddr, setNewLocAddr]=useState("");
  const [showLocMgr, setShowLocMgr]=useState(false);

  // 儲存常用地點
  const saveLoc=()=>{
    if(!newLocName.trim()||!newLocAddr.trim()) return;
    const next=[...savedLocs,{name:newLocName.trim(),address:newLocAddr.trim()}];
    setSavedLocs(next); localStorage.setItem("saved_locations",JSON.stringify(next));
    setNewLocName(""); setNewLocAddr("");
  };
  const deleteLoc=i=>{ const next=savedLocs.filter((_,idx)=>idx!==i); setSavedLocs(next); localStorage.setItem("saved_locations",JSON.stringify(next)); };

  const saveApiKey=()=>{ localStorage.setItem("gmaps_api_key",apiKey.trim()); setKeySaved(true); setTimeout(()=>setKeySaved(false),2000); };

  const inp={width:"100%",padding:"10px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,fontSize:14,background:"#fff",color:T.text};

  // 地址欄位帶快選
  const AddrInput=({label,value,onChange,placeholder})=>(
    <div style={{gridColumn:"1 / -1"}}>
      <label style={{fontSize:12,color:T.textMuted,fontWeight:600,display:"block",marginBottom:4}}>{label}</label>
      <input style={inp} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}/>
      {savedLocs.length>0&&<div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
        {savedLocs.map((loc,i)=>(
          <button key={i} onClick={()=>onChange(loc.address)} style={{background:"#E3F2FD",border:`1px solid ${T.border}`,borderRadius:16,padding:"3px 10px",fontSize:12,cursor:"pointer",color:T.primary,fontWeight:600}}>📍 {loc.name}</button>
        ))}
      </div>}
    </div>
  );

  const setDay=(dk,field,val)=>setS(prev=>({...prev,days:{...prev.days,[dk]:{...prev.days?.[dk],[field]:val}}}));

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      {/* 醫師標示 */}
      <div style={{background:docColor,color:"#fff",borderRadius:12,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:18}}>👨‍⚕️</span>
        <span style={{fontSize:15,fontWeight:700}}>目前設定：{doctor} 醫師的行程</span>
      </div>

      {/* API 金鑰 */}
      <div style={{background:T.card,borderRadius:16,padding:18,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",marginBottom:14,border:getApiKey()?"none":`2px solid ${T.danger}`}}>
        <h2 style={{fontSize:15,color:T.primary,marginBottom:6,display:"flex",alignItems:"center",gap:8}}>
          🔑 Google Maps API 金鑰
          {getApiKey()?<span style={{fontSize:11,background:"#E8F5E9",color:T.success,padding:"2px 8px",borderRadius:8,fontWeight:600}}>✅ 已設定</span>:<span style={{fontSize:11,background:"#FFEBEE",color:T.danger,padding:"2px 8px",borderRadius:8,fontWeight:600}}>⚠️ 未設定</span>}
        </h2>
        <div style={{fontSize:12,color:T.textMuted,marginBottom:8}}>金鑰僅存於瀏覽器本機，不會寫入程式碼。</div>
        <div style={{display:"flex",gap:8}}>
          <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="貼上 API 金鑰..."
            style={{...inp,flex:1,fontFamily:"monospace",fontSize:13}}/>
          <button onClick={()=>setShowKey(v=>!v)} style={{padding:"10px 12px",borderRadius:8,border:`1.5px solid ${T.border}`,background:"#fff",cursor:"pointer"}}>{showKey?"🙈":"👁️"}</button>
          <button onClick={saveApiKey} style={{padding:"10px 16px",borderRadius:8,border:"none",background:keySaved?T.success:T.primaryLight,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>{keySaved?"✅ 已儲存":"儲存"}</button>
        </div>
        {apiKey&&<button onClick={()=>{localStorage.removeItem("gmaps_api_key");setApiKey("");}} style={{marginTop:6,background:"none",border:"none",color:T.danger,fontSize:12,cursor:"pointer",textDecoration:"underline"}}>清除金鑰</button>}
      </div>

      {/* 常用地點 */}
      <div style={{background:T.card,borderRadius:16,padding:18,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showLocMgr?12:0}}>
          <h2 style={{fontSize:15,color:T.primary,display:"flex",alignItems:"center",gap:6}}>📍 常用地點 <span style={{fontSize:12,fontWeight:400,color:T.textMuted}}>（{savedLocs.length}個）</span></h2>
          <button onClick={()=>setShowLocMgr(v=>!v)} style={{background:T.primary,color:"#fff",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700}}>{showLocMgr?"收起":"＋ 管理"}</button>
        </div>
        {showLocMgr&&<>
          {savedLocs.map((loc,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${T.border}`}}>
              <span style={{fontSize:13,fontWeight:700,color:T.primary,minWidth:55}}>{loc.name}</span>
              <span style={{fontSize:12,color:T.textMuted,flex:1}}>{loc.address}</span>
              <button onClick={()=>deleteLoc(i)} style={{background:"none",border:"none",color:T.danger,cursor:"pointer"}}>🗑️</button>
            </div>
          ))}
          <div style={{display:"grid",gridTemplateColumns:"1fr 2fr auto",gap:8,alignItems:"end",marginTop:10}}>
            <div><label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:3,fontWeight:600}}>名稱</label><input style={{...inp,padding:"8px 10px"}} value={newLocName} onChange={e=>setNewLocName(e.target.value)} placeholder="診所、家..."/></div>
            <div><label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:3,fontWeight:600}}>地址</label><input style={{...inp,padding:"8px 10px"}} value={newLocAddr} onChange={e=>setNewLocAddr(e.target.value)} placeholder="高雄市○○區○○路"/></div>
            <button onClick={saveLoc} disabled={!newLocName.trim()||!newLocAddr.trim()} style={{padding:"8px 14px",borderRadius:8,border:"none",background:(!newLocName.trim()||!newLocAddr.trim())?"#ccc":T.primaryLight,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:13}}>新增</button>
          </div>
        </>}
        {!showLocMgr&&savedLocs.length>0&&<div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>{savedLocs.map((loc,i)=><span key={i} style={{background:"#E3F2FD",color:T.primary,fontSize:12,padding:"3px 10px",borderRadius:12,fontWeight:600}}>📍 {loc.name}</span>)}</div>}
        {!showLocMgr&&savedLocs.length===0&&<div style={{fontSize:12,color:T.textMuted,marginTop:6}}>點「管理」新增常用地點，填地址時可一鍵套用</div>}
      </div>

      {/* 每日行程設定 */}
      <div style={{background:T.card,borderRadius:16,padding:20,boxShadow:"0 2px 16px rgba(0,0,0,0.08)",marginBottom:14}}>
        <h2 style={{fontSize:15,color:T.primary,marginBottom:6}}>⚙️ {doctor} 醫師的每日行程</h2>
        <div style={{fontSize:12,color:T.textMuted,marginBottom:12}}>每天獨立設定出發地點與時間，未填的那天不排班。</div>

        <div style={{marginBottom:14,paddingBottom:12,borderBottom:`1px solid ${T.border}`}}>
          <label style={{fontSize:12,color:T.textMuted,fontWeight:600,display:"block",marginBottom:4}}>預設每次看診時間（分鐘）</label>
          <input style={{...inp,maxWidth:150}} type="number" min="10" max="120" value={s.visitMins} onChange={e=>setS(prev=>({...prev,visitMins:parseInt(e.target.value)||25}))}/>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          {DAY_KEYS.map((dk,i)=>{
            const filled=!!(s.days?.[dk]?.startAddress);
            return <button key={dk} onClick={()=>setADay(dk)} style={{padding:"6px 13px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:activeDay===dk?docColor:filled?"#E3F2FD":"#F5F5F5",color:activeDay===dk?"#fff":filled?T.primary:"#BDBDBD",boxShadow:activeDay===dk?"0 2px 8px rgba(0,0,0,.2)":"none"}}>{DAYS[i]}{filled?" ✓":""}</button>;
          })}
        </div>

        {DAY_KEYS.map(dk=>activeDay===dk&&(
          <div key={dk} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <AddrInput label="出發地點" value={s.days?.[dk]?.startAddress||""} onChange={v=>setDay(dk,"startAddress",v)} placeholder="高雄市○○區○○路123號"/>
            <AddrInput label="結束地點（留空＝同出發地）" value={s.days?.[dk]?.endAddress||""} onChange={v=>setDay(dk,"endAddress",v)} placeholder="高雄市○○區○○路"/>
            <div>
              <label style={{fontSize:12,color:T.textMuted,fontWeight:600,display:"block",marginBottom:4}}>出發時間</label>
              <input style={inp} type="time" value={s.days?.[dk]?.startTime||"09:00"} onChange={e=>setDay(dk,"startTime",e.target.value)}/>
            </div>
            <div>
              <label style={{fontSize:12,color:T.textMuted,fontWeight:600,display:"block",marginBottom:4}}>結束時間</label>
              <input style={inp} type="time" value={s.days?.[dk]?.endTime||"18:00"} onChange={e=>setDay(dk,"endTime",e.target.value)}/>
            </div>
          </div>
        ))}
        <button onClick={()=>onSave(s)} style={{marginTop:14,background:T.primaryLight,color:"#fff",border:"none",borderRadius:9,padding:"10px 20px",fontSize:14,fontWeight:700,cursor:"pointer"}}>💾 儲存設定</button>
      </div>

      {/* 排班摘要 */}
      <div style={{background:T.card,borderRadius:16,padding:18,boxShadow:"0 2px 16px rgba(0,0,0,0.08)"}}>
        <h2 style={{fontSize:15,color:T.primary,marginBottom:12}}>📊 本週排班摘要（{doctor} 醫師）</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:12}}>
          {DAY_KEYS.map((dk,i)=>{
            const count=patients.filter(p=>scheduleData[p.id]?.[dk]?.enabled).length;
            return <div key={dk} style={{background:count>0?"#E3F2FD":"#F5F5F5",borderRadius:10,padding:"8px 0",textAlign:"center",border:`1px solid ${count>0?T.border:"#E0E0E0"}`}}>
              <div style={{fontSize:11,color:T.textMuted}}>{DAYS[i]}</div>
              <div style={{fontSize:20,fontWeight:700,color:count>0?docColor:"#BDBDBD"}}>{count}</div>
              <div style={{fontSize:10,color:T.textMuted}}>位</div>
            </div>;
          })}
        </div>
        <div style={{fontSize:13,color:T.textMuted,marginBottom:14}}>
          {doctor} 醫師共 <strong style={{color:docColor}}>{scheduledCount}</strong> 位患者已設定可看診時間（共 {patients.length} 位）
        </div>
        <button onClick={onPlan} disabled={planning||scheduledCount===0} style={{width:"100%",padding:13,borderRadius:12,background:planning||scheduledCount===0?"#BDBDBD":docColor,color:"#fff",border:"none",fontSize:15,fontWeight:700,cursor:planning||scheduledCount===0?"not-allowed":"pointer",boxShadow:planning?"none":`0 4px 16px rgba(0,0,0,0.2)`}}>
          {planning?"🔄 規劃中...":`🚗 規劃 ${doctor} 醫師的本週路線`}
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ScheduleView
// ══════════════════════════════════════════════════════════════
function ScheduleView({ doctor, docColor, patients, scheduleData, onSave, defaultVisitMins }) {
  const [search, setSearch] = useState("");
  const [editing, setEditing] = useState(null);

  // 同步更新個案地址到 localStorage（個案管理 App 共用）
  const savePatientAddress = (patientId, address) => {
    const all = JSON.parse(localStorage.getItem(LOCAL_KEY_PATIENTS)||"[]");
    const next = all.map(p => p.id===patientId ? {...p, address} : p);
    localStorage.setItem(LOCAL_KEY_PATIENTS, JSON.stringify(next));
  };

  const filtered = patients.filter(p=>!search||(p.name||"").includes(search)||(p.chartNo||"").includes(search));

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{background:docColor,color:"#fff",borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>📅</span>
        <span style={{fontSize:14,fontWeight:700}}>{doctor} 醫師的患者排班設定</span>
        <span style={{marginLeft:"auto",fontSize:12,opacity:.85}}>{patients.length} 位患者</span>
      </div>

      <div style={{background:T.card,borderRadius:12,padding:"12px 14px",marginBottom:10,fontSize:13,color:T.textMuted}}>
        為每位患者設定可看診的星期和時間窗口。點擊患者名稱展開設定。
      </div>

      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:T.textMuted}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋姓名、病歷號..."
          style={{width:"100%",padding:"10px 12px 10px 32px",borderRadius:10,border:`1.5px solid ${T.border}`,fontSize:14,background:"#fff"}}/>
      </div>

      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:T.textMuted}}>
        <div style={{fontSize:32,marginBottom:8}}>👤</div>
        <div>{search?"找不到符合的患者":doctor+" 醫師目前無患者，請先在個案管理中填寫醫師欄位"}</div>
      </div>}

      {filtered.map(p=>(
        <PatientScheduleCard key={p.id} p={p} docColor={docColor}
          schedule={scheduleData[p.id]||{}}
          isEditing={editing===p.id}
          onToggle={()=>setEditing(editing===p.id?null:p.id)}
          onSave={data=>{onSave(p.id,data);setEditing(null);}}
          onSaveAddress={(addr)=>savePatientAddress(p.id,addr)}
          defaultVisitMins={defaultVisitMins}/>
      ))}
    </div>
  );
}

// 完整七天
const ALL_DAY_KEYS  = ["mon","tue","wed","thu","fri","sat","sun"];
const ALL_DAY_NAMES = ["週一","週二","週三","週四","週五","週六","週日"];

function PatientScheduleCard({ p, docColor, schedule, isEditing, onToggle, onSave, onSaveAddress, defaultVisitMins }) {
  // days: { mon: [ {start,end,visitMins}, ... ], ... }
  const initDays = () => {
    const d = {};
    ALL_DAY_KEYS.forEach(dk => {
      if (schedule[dk]?.slots) {
        d[dk] = schedule[dk].slots;
      } else if (schedule[dk]?.enabled) {
        // 舊格式轉換
        d[dk] = [{ start: schedule.windowStart||"09:00", end: schedule.windowEnd||"17:00", visitMins: schedule.visitMins||defaultVisitMins }];
      } else {
        d[dk] = [];
      }
    });
    return d;
  };

  const [days, setDays]       = useState(initDays);
  const [address, setAddress] = useState(p.address||"");
  const inp = { padding:"8px 10px", borderRadius:7, border:`1.5px solid ${T.border}`, fontSize:13, background:"#fff" };

  const enabledDays = ALL_DAY_KEYS.filter(dk => days[dk]?.length > 0);
  const allSelected = ALL_DAY_KEYS.every(dk => days[dk]?.length > 0);

  // 全選 / 全不選
  const toggleAll = () => {
    if (allSelected) {
      const d = {}; ALL_DAY_KEYS.forEach(dk => d[dk] = []); setDays(d);
    } else {
      const d = {};
      ALL_DAY_KEYS.forEach(dk => {
        d[dk] = days[dk]?.length > 0 ? days[dk] : [{ start:"09:00", end:"17:00", visitMins:defaultVisitMins }];
      });
      setDays(d);
    }
  };

  // 切換某天
  const toggleDay = dk => {
    setDays(prev => ({
      ...prev,
      [dk]: prev[dk]?.length > 0 ? [] : [{ start:"09:00", end:"17:00", visitMins:defaultVisitMins }]
    }));
  };

  // 新增時段
  const addSlot = dk => {
    setDays(prev => ({ ...prev, [dk]: [...(prev[dk]||[]), { start:"09:00", end:"17:00", visitMins:defaultVisitMins }] }));
  };

  // 刪除時段
  const removeSlot = (dk, idx) => {
    setDays(prev => { const s=[...prev[dk]]; s.splice(idx,1); return {...prev,[dk]:s}; });
  };

  // 更新時段欄位
  const updateSlot = (dk, idx, field, val) => {
    setDays(prev => {
      const s = prev[dk].map((slot,i) => i===idx ? {...slot,[field]:val} : slot);
      return {...prev,[dk]:s};
    });
  };

  const handleSave = () => {
    if (address.trim() !== (p.address||"").trim()) {
      onSaveAddress(address.trim());
      p.address = address.trim();
    }
    // 轉換格式供路線規劃使用
    const out = {};
    ALL_DAY_KEYS.forEach(dk => {
      out[dk] = { enabled: days[dk]?.length>0, slots: days[dk]||[] };
      // 相容舊格式（取第一個時段作為代表）
      if (days[dk]?.length > 0) {
        out.windowStart = days[dk][0].start;
        out.windowEnd   = days[dk][0].end;
        out.visitMins   = days[dk][0].visitMins;
      }
    });
    onSave(out);
  };

  return (
    <div style={{background:T.card,borderRadius:12,marginBottom:8,boxShadow:"0 1px 8px rgba(0,0,0,0.06)",overflow:"hidden"}}>
      {/* 標題列 */}
      <div onClick={onToggle} style={{padding:"12px 14px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{minWidth:0,flex:1}}>
          <span style={{fontSize:14,fontWeight:700,color:T.text}}>{p.name}</span>
          {p.chartNo&&<span style={{fontSize:12,color:T.textMuted,marginLeft:8}}>#{p.chartNo}</span>}
          {p.diagnosis&&<span style={{fontSize:11,color:T.textMuted,marginLeft:6}}>🩺{p.diagnosis}</span>}
          {enabledDays.length>0&&(
            <div style={{marginTop:3,display:"flex",gap:3,flexWrap:"wrap"}}>
              {enabledDays.map(dk=>(
                <span key={dk} style={{background:docColor,color:"#fff",fontSize:10,fontWeight:700,padding:"1px 7px",borderRadius:8}}>
                  {ALL_DAY_NAMES[ALL_DAY_KEYS.indexOf(dk)]} {days[dk].length>1?`×${days[dk].length}`:""}
                </span>
              ))}
            </div>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,marginLeft:8}}>
          {enabledDays.length===0&&<span style={{fontSize:11,color:"#BDBDBD"}}>未設定</span>}
          <span style={{color:T.textMuted,fontSize:13}}>{isEditing?"▲":"▼"}</span>
        </div>
      </div>

      {/* 展開內容 */}
      {isEditing&&(
        <div style={{padding:"0 14px 16px",borderTop:`1px solid ${T.border}`}}>

          {/* 星期選擇列 + 全選 */}
          <div style={{paddingTop:12,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
              <button onClick={toggleAll} style={{
                padding:"5px 12px",borderRadius:16,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,
                background: allSelected?docColor:"#F5F5F5",
                color: allSelected?"#fff":T.textMuted,
              }}>{allSelected?"✓ 全選":"全選"}</button>
              {ALL_DAY_KEYS.map((dk,i)=>{
                const on = days[dk]?.length>0;
                return (
                  <button key={dk} onClick={()=>toggleDay(dk)} style={{
                    padding:"5px 12px",borderRadius:16,border:`1.5px solid ${on?docColor:T.border}`,cursor:"pointer",fontSize:12,fontWeight:600,
                    background: on?docColor:"#fff",
                    color: on?"#fff":T.textMuted,
                  }}>{ALL_DAY_NAMES[i]}{on&&days[dk].length>1?` ×${days[dk].length}`:""}</button>
                );
              })}
            </div>
          </div>

          {/* 各天時段設定 */}
          {ALL_DAY_KEYS.map((dk,di)=> days[dk]?.length>0 && (
            <div key={dk} style={{background:"#F8F9FF",borderRadius:10,padding:"10px 12px",marginBottom:10,border:`1px solid ${T.border}`}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:13,fontWeight:700,color:docColor}}>{ALL_DAY_NAMES[di]}</span>
                <button onClick={()=>addSlot(dk)} style={{background:docColor,color:"#fff",border:"none",borderRadius:8,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>＋ 新增時段</button>
              </div>
              {days[dk].map((slot,si)=>(
                <div key={si} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",gap:8,marginBottom:si<days[dk].length-1?8:0,alignItems:"end"}}>
                  <div>
                    <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:2,fontWeight:600}}>開始時間</label>
                    <input style={inp} type="time" value={slot.start} onChange={e=>updateSlot(dk,si,"start",e.target.value)}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:2,fontWeight:600}}>結束時間</label>
                    <input style={inp} type="time" value={slot.end} onChange={e=>updateSlot(dk,si,"end",e.target.value)}/>
                  </div>
                  <div>
                    <label style={{fontSize:10,color:T.textMuted,display:"block",marginBottom:2,fontWeight:600}}>看診分鐘</label>
                    <input style={inp} type="number" min="10" max="120" value={slot.visitMins} onChange={e=>updateSlot(dk,si,"visitMins",parseInt(e.target.value)||defaultVisitMins)}/>
                  </div>
                  <button onClick={()=>removeSlot(dk,si)} style={{padding:"8px 10px",borderRadius:7,border:`1px solid ${T.border}`,background:"#fff",color:T.danger,cursor:"pointer",fontSize:13,marginBottom:1}}>✕</button>
                </div>
              ))}
            </div>
          ))}

          {enabledDays.length===0&&(
            <div style={{textAlign:"center",padding:"12px 0",color:T.textMuted,fontSize:13}}>請選擇可訪視的星期</div>
          )}

          {/* 地址欄位 */}
          <div style={{marginTop:12,marginBottom:12}}>
            <label style={{fontSize:11,color:T.textMuted,display:"block",marginBottom:4,fontWeight:600}}>
              患者地址
              {!p.address&&<span style={{color:T.danger,marginLeft:6}}>（個案資料未填，請補充）</span>}
              {p.address&&address===p.address&&<span style={{color:T.success,marginLeft:6}}>✅ 已從個案資料帶入</span>}
              {p.address&&address!==p.address&&address&&<span style={{color:T.warning,marginLeft:6}}>⚠️ 儲存後將同步更新個案資料</span>}
            </label>
            <input style={{...inp,width:"100%",background:address?"#fff":"#FFF8E1",border:`1.5px solid ${address?T.border:T.warning}`}}
              value={address} onChange={e=>setAddress(e.target.value)} placeholder="高雄市○○區○○路123號"/>
            {!address&&<div style={{fontSize:11,color:T.danger,marginTop:3}}>⚠️ 未填地址，此患者無法加入路線規劃</div>}
          </div>

          <button onClick={handleSave} style={{background:`linear-gradient(135deg,${T.primaryDark},${T.primary})`,color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>✅ 儲存</button>
        </div>
      )}
    </div>
  );
}

// ResultView
// ══════════════════════════════════════════════════════════════
function ResultView({ result, doctor, docColor, activeDay, setActiveDay, getMapsUrl }) {
  const dayResult = result[activeDay]||{route:[],unscheduled:[]};
  const totalUnscheduled = DAY_KEYS.reduce((a,dk)=>a+(result[dk]?.unscheduled?.length||0),0);

  return (
    <div style={{animation:"fadeIn .3s ease"}}>
      <div style={{background:docColor,color:"#fff",borderRadius:12,padding:"10px 16px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>📊</span>
        <span style={{fontSize:14,fontWeight:700}}>{doctor} 醫師的本週路線</span>
      </div>

      {/* 星期選擇 */}
      <div style={{display:"flex",gap:7,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {DAY_KEYS.map((dk,i)=>{
          const r=result[dk]||{route:[],unscheduled:[]};
          return <button key={dk} onClick={()=>setActiveDay(dk)}
            style={{flexShrink:0,padding:"7px 13px",border:"none",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,
              background:activeDay===dk?docColor:r.skipped?"#F5F5F5":"#fff",
              color:activeDay===dk?"#fff":r.skipped?"#BDBDBD":T.primary,
              border:`1.5px solid ${activeDay===dk?docColor:r.skipped?"#E0E0E0":T.border}`,
              boxShadow:activeDay===dk?"0 2px 8px rgba(0,0,0,.2)":"none"}}>
            {DAYS[i]}{r.skipped?"":` (${r.route.length})`}
          </button>;
        })}
      </div>

      {/* 當天路線 */}
      <div style={{background:T.card,borderRadius:16,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,0.08)",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <h2 style={{fontSize:15,color:T.primary}}>{DAYS[DAY_KEYS.indexOf(activeDay)]} 路線 <span style={{fontSize:13,fontWeight:400,color:T.textMuted}}>共 {dayResult.route.length} 位</span></h2>
          {dayResult.route.length>0&&<a href={getMapsUrl(activeDay)} target="_blank" rel="noreferrer" style={{background:"#34A853",color:"#fff",textDecoration:"none",borderRadius:8,padding:"7px 13px",fontSize:12,fontWeight:700}}>🗺️ 導航</a>}
        </div>
        {dayResult.route.length===0?(
          <div style={{textAlign:"center",padding:"24px 0",color:T.textMuted}}>
            <div style={{fontSize:28,marginBottom:6}}>📭</div>
            <div style={{fontSize:13}}>{dayResult.skipped?"今日未設定出發地點":"今日無排程"}</div>
          </div>
        ):(
          <>
            <TimelineItem icon="🏠" label="出發地點" address={dayResult.daySettings?.startAddress||""} time={dayResult.daySettings?.startTime||""} isStart color={docColor}/>
            {dayResult.route.map((stop,i)=>(
              <TimelineItem key={stop.patient.id} icon={`${i+1}`} isNum color={docColor}
                label={stop.patient.name}
                sub={[stop.patient.chartNo&&`#${stop.patient.chartNo}`,stop.patient.diagnosis].
